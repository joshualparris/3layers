kind = "web"
previewPath = "/"
title = "Three-Layer RPG Continuity"
version = "1.0.0"
id = "artifacts/continuity-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23835

[services.development]
run = "pnpm --filter @workspace/continuity-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/continuity-app", "run", "build" ]
publicDir = "artifacts/continuity-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23835"
BASE_PATH = "/"
